services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: metadata-manager:local
    ports:
      - "${UI_PORT:-8000}:8000"
    environment:
      CONFIG_DIR: /config
      MEDIA_DIR: /media
    volumes:
      - ${CONFIG_PATH:-./config}:/config
      - ${MEDIA_PATH:-./media}:/media
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
